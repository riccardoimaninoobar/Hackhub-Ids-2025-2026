# Usa un database in memoria isolato e pulito per i test
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver

# Ricrea le tabelle da zero ad ogni avvio dei test
spring.jpa.hibernate.ddl-auto=create-drop

# Dichiara che questo è il profilo di test (disattiverà il Seeder!)
spring.profiles.active=test